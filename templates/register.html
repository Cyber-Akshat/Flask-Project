<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | FlaskApp</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b,#2563eb);
            padding:20px;
        }

        .card{
            width:100%;
            max-width:500px;
            background:rgba(255,255,255,.1);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.15);
            border-radius:24px;
            padding:40px;
            color:white;
            box-shadow:0 20px 50px rgba(0,0,0,.25);
        }

        .logo{
            text-align:center;
            font-size:2rem;
            font-weight:700;
            margin-bottom:10px;
        }

        .subtitle{
            text-align:center;
            color:rgba(255,255,255,.8);
            margin-bottom:30px;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:.95rem;
        }

        input{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:rgba(255,255,255,.12);
            color:white;
            outline:none;
            font-size:1rem;
        }

        input::placeholder{
            color:rgba(255,255,255,.6);
        }

        .register-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:12px;
            background:white;
            color:#2563eb;
            font-size:1rem;
            font-weight:600;
            cursor:pointer;
            transition:.3s;
            margin-top:10px;
        }

        .register-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 25px rgba(255,255,255,.25);
        }

        .flash{
            background:rgba(255,99,99,.2);
            border:1px solid rgba(255,99,99,.4);
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
        }

        .links{
            text-align:center;
            margin-top:20px;
        }

        .links a{
            color:white;
            text-decoration:none;
            font-weight:500;
        }

        .links a:hover{
            text-decoration:underline;
        }
    </style>
</head>
<body>

<div class="card">

    <div class="logo">FlaskApp</div>
    <div class="subtitle">Create your account</div>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="form-group">
            <label>Username</label>
            <input
                type="text"
                name="username"
                placeholder="Choose a username"
                required
            >
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                name="email"
                placeholder="Enter your email"
                required
            >
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Create a password"
                required
            >
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm your password"
                required
            >
        </div>

        <button type="submit" class="register-btn">
            Create Account
        </button>

    </form>

    <div class="links">
        Already have an account?
        <a href="{{ url_for('login') }}">Login</a>
    </div>

</div>

</body>
</html>
